name: Bug report
description: Report a reproducible bug in Proxy mode, Tunnel mode, or release packaging
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: architecture
    attributes:
      label: macOS architecture
      options:
        - arm64
        - x86_64
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Affected mode
      options:
        - Proxy
        - Tunnel
        - Both
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.2.1"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open app\n2. Paste config\n3. Connect..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / diagnostic dump
      render: shell
