name: Feature request
description: Suggest an improvement to the app, UX, protocol support, or release workflow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: "What is missing or painful today?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: "What should change?"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      placeholder: "Screenshots, examples, comparable tools, constraints..."
